<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <defs>
    <linearGradient id="p4-bg" x1="0" y1="0" x2="640" y2="400">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="50%" stop-color="#f0fdfa" />
      <stop offset="100%" stop-color="#ecfdf5" />
    </linearGradient>
    <linearGradient id="p4-hero-grad" x1="0" y1="0" x2="640" y2="200">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="p4-btn" x1="0" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" rx="12" fill="url(#p4-bg)" />

  <!-- Browser chrome -->
  <rect width="640" height="32" rx="12" fill="#f0fdf4" />
  <rect y="12" width="640" height="20" fill="#f0fdf4" />
  <circle cx="20" cy="16" r="5" fill="#fca5a5" />
  <circle cx="38" cy="16" r="5" fill="#fde68a" />
  <circle cx="56" cy="16" r="5" fill="#6ee7b7" />
  <rect x="200" y="10" width="240" height="12" rx="6" fill="#d1fae5" />

  <!-- Navigation bar -->
  <rect y="32" width="640" height="36" fill="white" opacity="0.8" />
  <rect x="24" y="42" width="60" height="8" rx="4" fill="#047857" opacity="0.6" />
  <rect x="360" y="44" width="40" height="5" rx="2.5" fill="#1a3a2a" opacity="0.2" />
  <rect x="416" y="44" width="50" height="5" rx="2.5" fill="#1a3a2a" opacity="0.2" />
  <rect x="482" y="44" width="35" height="5" rx="2.5" fill="#1a3a2a" opacity="0.2" />
  <rect x="548" y="40" width="68" height="18" rx="9" fill="url(#p4-btn)" />
  <rect x="560" y="46" width="44" height="6" rx="3" fill="white" opacity="0.8" />

  <!-- Hero section -->
  <rect y="68" width="640" height="180" fill="url(#p4-hero-grad)" opacity="0.08" />

  <!-- Hero badge -->
  <rect x="220" y="85" width="200" height="20" rx="10" fill="#059669" opacity="0.1" />
  <rect x="235" y="91" width="170" height="8" rx="4" fill="#059669" opacity="0.3" />

  <!-- Hero heading (simulated text lines) -->
  <rect x="140" y="118" width="360" height="14" rx="4" fill="#0f3d2e" opacity="0.7" />
  <rect x="180" y="140" width="280" height="14" rx="4" fill="#0f3d2e" opacity="0.5" />

  <!-- Hero subtext -->
  <rect x="160" y="168" width="320" height="6" rx="3" fill="#1a3a2a" opacity="0.2" />
  <rect x="190" y="180" width="260" height="6" rx="3" fill="#1a3a2a" opacity="0.15" />

  <!-- CTA buttons -->
  <rect x="222" y="200" width="100" height="28" rx="14" fill="url(#p4-btn)" />
  <rect x="240" y="210" width="64" height="8" rx="4" fill="white" opacity="0.85" />
  <rect x="334" y="200" width="90" height="28" rx="14" fill="transparent" stroke="#059669" stroke-width="1.5" />
  <rect x="349" y="210" width="60" height="8" rx="4" fill="#059669" opacity="0.4" />

  <!-- Feature cards section -->
  <rect x="24" y="270" width="188" height="110" rx="10" fill="white" />
  <!-- Card 1 icon -->
  <circle cx="48" cy="295" r="14" fill="#d1fae5" />
  <path d="M42 295L46 299L54 291" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="36" y="318" width="100" height="6" rx="3" fill="#0f3d2e" opacity="0.4" />
  <rect x="36" y="330" width="160" height="4" rx="2" fill="#1a3a2a" opacity="0.15" />
  <rect x="36" y="340" width="140" height="4" rx="2" fill="#1a3a2a" opacity="0.12" />
  <rect x="36" y="350" width="120" height="4" rx="2" fill="#1a3a2a" opacity="0.1" />

  <rect x="226" y="270" width="188" height="110" rx="10" fill="white" />
  <!-- Card 2 icon -->
  <circle cx="250" cy="295" r="14" fill="#ccfbf1" />
  <path d="M244 292L250 298L256 292M244 298L250 292" stroke="#0d9488" stroke-width="2" stroke-linecap="round" />
  <rect x="238" y="318" width="110" height="6" rx="3" fill="#0f3d2e" opacity="0.4" />
  <rect x="238" y="330" width="160" height="4" rx="2" fill="#1a3a2a" opacity="0.15" />
  <rect x="238" y="340" width="145" height="4" rx="2" fill="#1a3a2a" opacity="0.12" />
  <rect x="238" y="350" width="130" height="4" rx="2" fill="#1a3a2a" opacity="0.1" />

  <rect x="428" y="270" width="188" height="110" rx="10" fill="white" />
  <!-- Card 3 icon -->
  <circle cx="452" cy="295" r="14" fill="#cffafe" />
  <rect x="445" y="289" width="14" height="12" rx="2" stroke="#0891b2" stroke-width="2" fill="none" />
  <line x1="448" y1="295" x2="456" y2="295" stroke="#0891b2" stroke-width="1.5" />
  <rect x="440" y="318" width="95" height="6" rx="3" fill="#0f3d2e" opacity="0.4" />
  <rect x="440" y="330" width="155" height="4" rx="2" fill="#1a3a2a" opacity="0.15" />
  <rect x="440" y="340" width="140" height="4" rx="2" fill="#1a3a2a" opacity="0.12" />
  <rect x="440" y="350" width="125" height="4" rx="2" fill="#1a3a2a" opacity="0.1" />
</svg>
