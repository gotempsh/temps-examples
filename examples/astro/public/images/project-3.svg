<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <defs>
    <linearGradient id="p3-bg" x1="0" y1="0" x2="640" y2="400">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#0a1f1a" />
    </linearGradient>
  </defs>

  <!-- Background - dark terminal -->
  <rect width="640" height="400" rx="12" fill="url(#p3-bg)" />

  <!-- Window chrome -->
  <rect width="640" height="32" rx="12" fill="#0f3d2e" />
  <rect y="12" width="640" height="20" fill="#0f3d2e" />
  <circle cx="20" cy="16" r="5" fill="#f87171" opacity="0.8" />
  <circle cx="38" cy="16" r="5" fill="#fbbf24" opacity="0.8" />
  <circle cx="56" cy="16" r="5" fill="#34d399" opacity="0.8" />
  <text x="320" y="20" font-family="monospace" font-size="11" fill="#6ee7b7" opacity="0.5" text-anchor="middle">~/api-server</text>

  <!-- Terminal content -->
  <!-- Prompt 1 -->
  <text x="20" y="60" font-family="monospace" font-size="12">
    <tspan fill="#34d399">alex@dev</tspan><tspan fill="#6ee7b7">:</tspan><tspan fill="#67e8f9">~/api</tspan><tspan fill="#6ee7b7">$ </tspan><tspan fill="#d1fae5">curl -X GET /api/v1/users</tspan>
  </text>

  <!-- JSON response -->
  <text x="20" y="85" font-family="monospace" font-size="11" fill="#6ee7b7" opacity="0.6">{</text>
  <text x="36" y="100" font-family="monospace" font-size="11">
    <tspan fill="#34d399">"status"</tspan><tspan fill="#6ee7b7">: </tspan><tspan fill="#fbbf24">200</tspan><tspan fill="#6ee7b7">,</tspan>
  </text>
  <text x="36" y="115" font-family="monospace" font-size="11">
    <tspan fill="#34d399">"data"</tspan><tspan fill="#6ee7b7">: [</tspan>
  </text>
  <text x="52" y="130" font-family="monospace" font-size="11" fill="#6ee7b7">{"<tspan fill="#34d399">id</tspan>": <tspan fill="#fbbf24">1</tspan>, "<tspan fill="#34d399">name</tspan>": "<tspan fill="#a7f3d0">Alice</tspan>", "<tspan fill="#34d399">role</tspan>": "<tspan fill="#a7f3d0">admin</tspan>"},</text>
  <text x="52" y="145" font-family="monospace" font-size="11" fill="#6ee7b7">{"<tspan fill="#34d399">id</tspan>": <tspan fill="#fbbf24">2</tspan>, "<tspan fill="#34d399">name</tspan>": "<tspan fill="#a7f3d0">Bob</tspan>", "<tspan fill="#34d399">role</tspan>": "<tspan fill="#a7f3d0">user</tspan>"},</text>
  <text x="52" y="160" font-family="monospace" font-size="11" fill="#6ee7b7">{"<tspan fill="#34d399">id</tspan>": <tspan fill="#fbbf24">3</tspan>, "<tspan fill="#34d399">name</tspan>": "<tspan fill="#a7f3d0">Carol</tspan>", "<tspan fill="#34d399">role</tspan>": "<tspan fill="#a7f3d0">user</tspan>"}</text>
  <text x="36" y="175" font-family="monospace" font-size="11" fill="#6ee7b7">],</text>
  <text x="36" y="190" font-family="monospace" font-size="11">
    <tspan fill="#34d399">"total"</tspan><tspan fill="#6ee7b7">: </tspan><tspan fill="#fbbf24">3</tspan>
  </text>
  <text x="20" y="205" font-family="monospace" font-size="11" fill="#6ee7b7" opacity="0.6">}</text>

  <!-- Prompt 2 -->
  <text x="20" y="235" font-family="monospace" font-size="12">
    <tspan fill="#34d399">alex@dev</tspan><tspan fill="#6ee7b7">:</tspan><tspan fill="#67e8f9">~/api</tspan><tspan fill="#6ee7b7">$ </tspan><tspan fill="#d1fae5">bun run test</tspan>
  </text>

  <!-- Test output -->
  <text x="20" y="260" font-family="monospace" font-size="11">
    <tspan fill="#34d399">PASS</tspan><tspan fill="#6ee7b7"> src/routes/users.test.ts</tspan>
  </text>
  <text x="36" y="277" font-family="monospace" font-size="11">
    <tspan fill="#34d399">✓</tspan><tspan fill="#a7f3d0"> GET /users returns list </tspan><tspan fill="#6ee7b7" opacity="0.4">(3ms)</tspan>
  </text>
  <text x="36" y="292" font-family="monospace" font-size="11">
    <tspan fill="#34d399">✓</tspan><tspan fill="#a7f3d0"> POST /users creates user </tspan><tspan fill="#6ee7b7" opacity="0.4">(5ms)</tspan>
  </text>
  <text x="36" y="307" font-family="monospace" font-size="11">
    <tspan fill="#34d399">✓</tspan><tspan fill="#a7f3d0"> DELETE /users/:id removes user </tspan><tspan fill="#6ee7b7" opacity="0.4">(2ms)</tspan>
  </text>
  <text x="20" y="330" font-family="monospace" font-size="11">
    <tspan fill="#34d399">PASS</tspan><tspan fill="#6ee7b7"> src/middleware/auth.test.ts</tspan>
  </text>
  <text x="36" y="347" font-family="monospace" font-size="11">
    <tspan fill="#34d399">✓</tspan><tspan fill="#a7f3d0"> validates JWT token </tspan><tspan fill="#6ee7b7" opacity="0.4">(1ms)</tspan>
  </text>
  <text x="36" y="362" font-family="monospace" font-size="11">
    <tspan fill="#34d399">✓</tspan><tspan fill="#a7f3d0"> rejects expired tokens </tspan><tspan fill="#6ee7b7" opacity="0.4">(1ms)</tspan>
  </text>

  <!-- Summary -->
  <text x="20" y="385" font-family="monospace" font-size="11">
    <tspan fill="#6ee7b7">Tests: </tspan><tspan fill="#34d399">5 passed</tspan><tspan fill="#6ee7b7">, 5 total | Time: </tspan><tspan fill="#fbbf24">0.12s</tspan>
  </text>

  <!-- Cursor blink -->
  <rect x="20" y="392" width="7" height="2" fill="#34d399" opacity="0.7" />
</svg>
