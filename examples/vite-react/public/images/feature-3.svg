  </g>
  <defs>
    <linearGradient id="f3grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9640"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="f3bg" x1="0%" y1="0%" x2="100%" y2="100%">
