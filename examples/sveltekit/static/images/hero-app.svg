<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="hpink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="hrose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000015"/>
    </filter>
    <clipPath id="screen">
      <rect x="40" y="70" width="720" height="410" rx="4"/>
    </clipPath>
  </defs>

  <!-- Browser window -->
  <rect width="800" height="520" rx="12" fill="url(#hbg)" filter="url(#shadow)" stroke="#f9a8d4" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="52" rx="12" fill="white"/>
  <rect y="40" width="800" height="12" fill="white"/>
  <line x1="0" y1="52" x2="800" y2="52" stroke="#fce7f3" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="26" r="6" fill="#fda4af"/>
  <circle cx="48" cy="26" r="6" fill="#fdba74"/>
  <circle cx="68" cy="26" r="6" fill="#86efac"/>

  <!-- URL bar -->
  <rect x="120" y="14" width="560" height="26" rx="6" fill="#fdf2f8"/>
  <text x="400" y="32" text-anchor="middle" font-family="system-ui" font-size="11" fill="#9d174d" opacity="0.6">app.rosekit.dev/dashboard</text>

  <!-- Content area -->
  <g clip-path="url(#screen)">
    <!-- Sidebar -->
    <rect x="40" y="70" width="180" height="410" fill="white"/>
    <line x1="220" y1="70" x2="220" y2="480" stroke="#fce7f3" stroke-width="1"/>

    <!-- Sidebar logo -->
    <rect x="56" y="86" width="28" height="28" rx="6" fill="url(#hrose)"/>
    <text x="92" y="106" font-family="system-ui" font-weight="700" font-size="14" fill="#1f2937">RoseKit</text>

    <!-- Sidebar nav items -->
    <rect x="52" y="130" width="156" height="32" rx="6" fill="#fff1f2"/>
    <rect x="64" y="140" width="12" height="12" rx="2" fill="#e11d48"/>
    <text x="84" y="150" font-family="system-ui" font-size="12" fill="#e11d48">Dashboard</text>

    <rect x="64" y="176" width="12" height="12" rx="2" fill="#d1d5db"/>
    <text x="84" y="186" font-family="system-ui" font-size="12" fill="#6b7280">Analytics</text>

    <rect x="64" y="206" width="12" height="12" rx="2" fill="#d1d5db"/>
    <text x="84" y="216" font-family="system-ui" font-size="12" fill="#6b7280">Projects</text>

    <rect x="64" y="236" width="12" height="12" rx="2" fill="#d1d5db"/>
    <text x="84" y="246" font-family="system-ui" font-size="12" fill="#6b7280">Settings</text>

    <rect x="64" y="266" width="12" height="12" rx="2" fill="#d1d5db"/>
    <text x="84" y="276" font-family="system-ui" font-size="12" fill="#6b7280">Team</text>

    <!-- Main content -->
    <rect x="220" y="70" width="580" height="410" fill="#fefce8" opacity="0.05"/>

    <!-- Header -->
    <text x="248" y="106" font-family="system-ui" font-weight="700" font-size="18" fill="#1f2937">Good morning, Alex</text>
    <text x="248" y="124" font-family="system-ui" font-size="12" fill="#9ca3af">Here's what's happening with your projects today.</text>

    <!-- Stat cards row -->
    <rect x="248" y="144" width="164" height="80" rx="8" fill="white" stroke="#fce7f3" stroke-width="1"/>
    <text x="264" y="168" font-family="system-ui" font-size="11" fill="#9ca3af">Total Revenue</text>
    <text x="264" y="196" font-family="system-ui" font-weight="700" font-size="22" fill="#1f2937">$45,231</text>
    <text x="370" y="196" font-family="system-ui" font-size="10" fill="#16a34a">+20.1%</text>

    <rect x="424" y="144" width="164" height="80" rx="8" fill="white" stroke="#fce7f3" stroke-width="1"/>
    <text x="440" y="168" font-family="system-ui" font-size="11" fill="#9ca3af">Active Users</text>
    <text x="440" y="196" font-family="system-ui" font-weight="700" font-size="22" fill="#1f2937">2,350</text>
    <text x="526" y="196" font-family="system-ui" font-size="10" fill="#16a34a">+18.2%</text>

    <rect x="600" y="144" width="164" height="80" rx="8" fill="white" stroke="#fce7f3" stroke-width="1"/>
    <text x="616" y="168" font-family="system-ui" font-size="11" fill="#9ca3af">Conversions</text>
    <text x="616" y="196" font-family="system-ui" font-weight="700" font-size="22" fill="#1f2937">12.5%</text>
    <text x="710" y="196" font-family="system-ui" font-size="10" fill="#16a34a">+4.3%</text>

    <!-- Chart area -->
    <rect x="248" y="240" width="340" height="220" rx="8" fill="white" stroke="#fce7f3" stroke-width="1"/>
    <text x="264" y="266" font-family="system-ui" font-weight="600" font-size="13" fill="#1f2937">Revenue Overview</text>

    <!-- Bar chart -->
    <rect x="280" y="370" width="24" height="60" rx="3" fill="#fecdd3"/>
    <rect x="316" y="340" width="24" height="90" rx="3" fill="#fecdd3"/>
    <rect x="352" y="310" width="24" height="120" rx="3" fill="#fda4af"/>
    <rect x="388" y="330" width="24" height="100" rx="3" fill="#fda4af"/>
    <rect x="424" y="290" width="24" height="140" rx="3" fill="url(#hrose)"/>
    <rect x="460" y="310" width="24" height="120" rx="3" fill="url(#hrose)"/>
    <rect x="496" y="280" width="24" height="150" rx="3" fill="url(#hrose)"/>
    <rect x="532" y="300" width="24" height="130" rx="3" fill="#fb7185"/>

    <!-- Chart labels -->
    <text x="292" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Jan</text>
    <text x="328" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Feb</text>
    <text x="364" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Mar</text>
    <text x="400" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Apr</text>
    <text x="436" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">May</text>
    <text x="472" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Jun</text>
    <text x="508" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Jul</text>
    <text x="544" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Aug</text>

    <!-- Activity feed -->
    <rect x="600" y="240" width="164" height="220" rx="8" fill="white" stroke="#fce7f3" stroke-width="1"/>
    <text x="616" y="266" font-family="system-ui" font-weight="600" font-size="13" fill="#1f2937">Activity</text>

    <circle cx="628" cy="292" r="4" fill="#e11d48"/>
    <text x="640" y="296" font-family="system-ui" font-size="10" fill="#6b7280">New signup</text>

    <circle cx="628" cy="316" r="4" fill="#f472b6"/>
    <text x="640" y="320" font-family="system-ui" font-size="10" fill="#6b7280">Plan upgraded</text>

    <circle cx="628" cy="340" r="4" fill="#fb923c"/>
    <text x="640" y="344" font-family="system-ui" font-size="10" fill="#6b7280">Invoice paid</text>

    <circle cx="628" cy="364" r="4" fill="#e11d48"/>
    <text x="640" y="368" font-family="system-ui" font-size="10" fill="#6b7280">New signup</text>

    <circle cx="628" cy="388" r="4" fill="#a78bfa"/>
    <text x="640" y="392" font-family="system-ui" font-size="10" fill="#6b7280">Feature used</text>

    <circle cx="628" cy="412" r="4" fill="#f472b6"/>
    <text x="640" y="416" font-family="system-ui" font-size="10" fill="#6b7280">Plan upgraded</text>
  </g>
</svg>
