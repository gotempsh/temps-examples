name: Build observability-starter image

# Publishes a prebuilt, multi-arch image to GHCR so the Temps "Observability
# Starter" template deploys instantly (pull + run, no build). The Temps template
# references ghcr.io/gotempsh/observability-starter:latest.

on:
  push:
    branches: [main]
    paths:
      - "examples/observability-starter/**"
      - ".github/workflows/observability-starter-image.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/gotempsh/observability-starter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: examples/observability-starter
          file: examples/observability-starter/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
